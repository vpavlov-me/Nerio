name: ci

on:
  pull_request:
    types: [opened, synchronize, reopened, labeled, unlabeled]
  push:
    branches:
      - main
      - dev
  workflow_dispatch:

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11.7.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm format:check
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm test:branch-policy
      - run: pnpm test:ui
      - run: pnpm test:a11y
      - run: pnpm test:catalog
      - run: pnpm test:tokens
      - run: pnpm validate:tokens
      - run: pnpm validate:runtime-axes
      - run: pnpm validate:typography
      - run: pnpm validate:catalog
      - run: pnpm validate:docs
      - run: pnpm validate:release
        env:
          NERIO_RELEASE_EXPECT_PUBLIC: "1"
      - run: pnpm test:cli
      - run: pnpm test:mcp
      - run: pnpm test:adapters
      - run: pnpm test:docs-examples
      - run: pnpm exec playwright install --with-deps chromium
      - run: pnpm test:browser
      - run: pnpm build
      - run: pnpm pack:check

  visual-regression:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
        with:
          version: 11.7.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Require maintainer approval for baseline changes
        if: github.event_name == 'pull_request'
        env:
          BASE_REF: ${{ github.base_ref }}
          EVENT_PATH: ${{ github.event_path }}
        run: |
          if git diff --name-only "origin/$BASE_REF...HEAD" -- tests/visual/__screenshots__ | grep -q .; then
            node -e 'const event = require(process.env.EVENT_PATH); const approved = event.pull_request.labels.some(({ name }) => name === "visual-baseline-approved"); if (!approved) { console.error("Baseline changes require the visual-baseline-approved maintainer label."); process.exit(1); }'
          fi
      - run: pnpm exec playwright install --with-deps chromium
      - run: pnpm test:visual
      - name: Upload visual regression artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: visual-regression-artifacts
          if-no-files-found: warn
          retention-days: 14
          path: |
            test-results/visual/**/*-actual.png
            test-results/visual/**/*-diff.png
            test-results/visual/**/trace.zip
            tests/visual/__screenshots__
      - name: Upload visual regression actuals
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: visual-regression-actuals
          if-no-files-found: warn
          retention-days: 14
          path: |
            test-results/visual/**/*-actual.png
            tests/visual/__screenshots__/linux/*.png
