name: ci

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11.7.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm format:check
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm test:ui
      - run: pnpm test:a11y
      - run: pnpm test:catalog
      - run: pnpm test:tokens
      - run: pnpm validate:tokens
      - run: pnpm validate:runtime-axes
      - run: pnpm validate:typography
      - run: pnpm validate:catalog
      - run: pnpm validate:docs
      - run: pnpm validate:release
      - run: pnpm test:cli
      - run: pnpm test:mcp
      - run: pnpm build
      - run: pnpm pack:check
