name: Bug report
description: Report a reproducible problem in Nerio.
title: "bug: "
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a problem. Please provide a minimal, reproducible example.
  - type: input
    id: package
    attributes:
      label: Affected package or area
      placeholder: "@nerio-ui/ui, docs, tokens, registry, demo-app"
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version or commit
      placeholder: "0.1.0 or a commit SHA"
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Minimal reproduction
      description: Include a repository, StackBlitz, or concise reproduction steps.
      placeholder: |
        1. Install ...
        2. Render ...
        3. Interact with ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      placeholder: "OS, browser, Node.js version, package manager, framework version"
    validations:
      required: true
  - type: checkboxes
    id: checks
    attributes:
      label: Checks
      options:
        - label: I searched existing issues before opening this report.
          required: true
        - label: I removed private or sensitive information from this report.
          required: true
